        // Timer

        const timerElem = document.getElementById('timer');
        setInterval(() => {
            if (timeLeft <= 0) {
                timerElem.innerText = "EXPIRED";
                timerElem.classList.add('text-gray-400');
            } else {
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                timerElem.innerText = 0${m}:${s < 10 ? '0'+s : s};
            }
        }, 1000);

        // Click Logic (Scoring Engine Prep)
        document.getElementById('joinBtn').addEventListener('click', function(e) {

            var url = this.href;

            document.getElementById('btnLoad').classList.remove('hidden');
